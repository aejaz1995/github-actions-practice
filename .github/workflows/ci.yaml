name: Node CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node with cache
        uses: actions/setup-node@v3
        with:
        node-version: 18
        cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
      - name: Run lint
        run: npm run lint
    on:
      pull_request:
        branches: [main]
